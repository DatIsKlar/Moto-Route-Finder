version: '3.8'
services:
  moto-route-finder:
    build: .
    container_name: moto-route-finder
    ports:
      - "5000:5000"
    volumes:
      - ${MAPS_HOST_DIR:-./maps}:/data/maps
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - MAPS_DIR=/data/maps
      - PORT=5000
      - HOST=0.0.0.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
