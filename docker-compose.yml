version: '3.8'
services:
  moto-route-finder:
    build: .
    container_name: moto-route-finder
    ports:
      - "5000:5000"
    volumes:
      - ./maps:/data/maps
      - ./data:/data/uploads
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - MAPS_DIR=/data/maps
      - PORT=5000
    restart: unless-stopped
